services:
  orbis-backend:
    image: orbis_backend_image
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: orbis_backend
    restart: always
    env_file:
      - ./apps/backend/.env.prod
    depends_on:
      - orbis_db
      - orbis_redis

  orbis-cdn:
    build:
      context: ./apps/cdn
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./apps/cdn/.env.prod

  orbis-frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - orbis-backend

  nginx:
    image: nginx:stable
    container_name: orbis_nginx
    restart: always
    ports:
      - 443:443
    depends_on:
      - orbis-frontend
      - orbis-backend
      - orbis-cdn
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/ssl/private:ro

  orbis_db:
    image: postgres:15
    container_name: orbis_db_container
    restart: always
    environment:
      POSTGRES_DB: orbis
      POSTGRES_USER: orbis
      POSTGRES_PASSWORD: orbis
    volumes:
      - postgres_data:/var/lib/postgresql/data

  orbis_redis:
    image: redis:7-alpine
    container_name: orbis_redis_container
    restart: always
    command: ["redis-server", "--requirepass", "admin"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
