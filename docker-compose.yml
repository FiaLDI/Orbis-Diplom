services:
  backend:
    image: orbis_backend_image
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      network: host
    container_name: orbis_backend
    restart: always
    env_file:
      - ./apps/backend/.env.prod
    depends_on:
      - orbis_db
      - orbis_redis
    network_mode: host

  cdn:
    build:
      context: ./apps/cdn
      dockerfile: Dockerfile
      network: host
    container_name: orbis_cdn
    restart: always
    env_file:
      - ./apps/cdn/.env.prod
    network_mode: host

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      network: host
    container_name: orbis_frontend
    restart: always
    depends_on:
      - backend
    network_mode: host

  nginx:
    image: nginx:stable
    container_name: orbis_nginx
    restart: always
    depends_on:
      - frontend
      - backend
      - cdn
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/ssl/private:ro
    network_mode: host

  # ===============================
  # 🗄 PostgreSQL
  # ===============================
  orbis_db:
    image: postgres:15
    container_name: orbis_db_container
    restart: always
    environment:
      POSTGRES_DB: orbis
      POSTGRES_USER: orbis
      POSTGRES_PASSWORD: orbis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    network_mode: host

  # ===============================
  # 💾 Redis
  # ===============================
  orbis_redis:
    image: redis:7-alpine
    container_name: orbis_redis_container
    restart: always
    command: ["redis-server", "--requirepass", "admin"]
    volumes:
      - redis_data:/data
    network_mode: host

volumes:
  postgres_data:
  redis_data:
