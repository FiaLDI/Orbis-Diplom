# ==============================================
# Orbis-Diplom — Nginx Reverse Proxy
# ==============================================
# FRONTEND: /                      → 127.0.0.1:5173
# BACKEND:  /api/*                 → 127.0.0.1:4000
# CDN:      /cdn/* /upload /download → 127.0.0.1:4005
# SOCKETS:  /socket.io             → 127.0.0.1:4000 (WS)
# ==============================================

# -------------------------------------------------
# HTTP → HTTPS redirect
# -------------------------------------------------
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

# -------------------------------------------------
# HTTPS main server
# -------------------------------------------------
server {
    listen 443 ssl http2;
    server_name localhost;

    ssl_certificate     /etc/ssl/private/selfsigned.pem;
    ssl_certificate_key /etc/ssl/private/selfsigned_key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~ ^/(cdn|upload|download)(/|$) {
        proxy_pass http://127.0.0.1:4005;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 30d;
        access_log off;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    access_log /var/log/nginx/orbis_access.log;
    error_log /var/log/nginx/orbis_error.log;
}
